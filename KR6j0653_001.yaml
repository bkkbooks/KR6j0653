body:
  text: 三藏菩提留支譯先欲作是法者彼像不刻作之若鑄印白𨭛銅栴檀及柏松等若奉造時一日一夜莫越過高三寸五寸七寸若畫綵色勿用皮膠須用香汁及有汁木其金色身正立有三頭各面上三目合成九目其鼻樓至齊頸繞蟲皮有四臂左上手把歡喜丸右上手把蘿蔔根次左右手作根本印著白衣腳踏金山復次造時莫令雜人見燒名香清淨不食五辛刻像了於淨室中安置其壇方圓縱廣一肘半高一指以黃土塗若不敢之作木壇彼像向西方師向於東方置二寶瓶立時菜華燒名香若無名香燒青木并沉水香室等供物餅乳粥歡喜團蘇蜜蘿蔔根煎餅果子種種供養每日三時奉供若呪師白衣著皆驅使并淨衣不淨者不用供養以人口莫火吹以扇不信人死亡事産生家人奴婢諸女人假名僧沙彌弟子莫近觸淨薦莚桶𣏐其資具清淨真言師於一切衆生起大慈悲心內外清淨以茅草為座順諸住所是法然即誦金色迦那婆底權現九目天根本大真言先二手外縛二頭指三合真言曰曩謨卒覩底一迦吒迦吒二麼吒麼吒三起里二合舋拏二合四舋拏二合舋拏二合五畔惹畔惹六曩謨卒都帝七護嚕捺羅八跛惹曳九娑嚩二合賀十阿部多十一泯拏乞懺二合質多十二曷𠰘引娑麼誐磋底丁以反十三諾乞使二合曩十六鉢曩鉢羅二合句跛野引𭤶引十七矩嚕矩嚕十八祖嚕祖嚕十九謨嚕謨嚕二十曩謨曩謨二十一娑嚩二合賀唵娑羅吽娑嚩二合賀以是真言誦三時每時一百八遍三日三夜亦七日七夜奉供即權現迦那婆底九目天王如影隨形順真言師心驅使示善惡又上品持我者我為人中王中品持我者我為王師下品持我者福貴無窮已凡一切善惡事所求願必無不果遂安元二年五月二十七日於法住寺法華堂僧坊依院宣法橋增運令書進給以御本書之了心惠記之
